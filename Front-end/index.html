<!DOCTYPE html>
<html lang="pt-br">




<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKE IS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Gravitas+One&display=swap" rel="stylesheet">
   
    <link rel="stylesheet" href="style.css">
</head>




<body>


    <div class="container">


        <h1>Explorador de Maquiagens💄</h1>
        <p class="subtitle">Explorando o Mundo dos Produtos de Maquiagem</p>


        <div class="make-box">
            <img src="" alt="Maquiagens" id="makeImage">
            <div id="makeTypes"></div>
        </div>




        <div class="controls">
            <button id="randomBtn"> Clique para mais ideias → </button>
        </div>




        <div class="search">
            <input
                type="text"
                id="makeInput"
                placeholder="Digite um produto (ex: blush, gloss, pó...)"
            >
            <button id="searchBtn">🔍 Buscar </button>
        </div>




    </div>




    <script src="script.js"></script>




</body>
</html>
